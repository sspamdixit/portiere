kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "PYTHONPATH=/home/runner/workspace/artifacts/api-server uvicorn portiere.main:app --host 0.0.0.0 --port $PORT --reload"

[services.production]

[services.production.build]
args = ["pip", "install", "-r", "/home/runner/workspace/artifacts/api-server/requirements.txt"]

[services.production.run]
args = ["sh", "-c", "PYTHONPATH=/home/runner/workspace/artifacts/api-server uvicorn portiere.main:app --host 0.0.0.0 --port $PORT"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
